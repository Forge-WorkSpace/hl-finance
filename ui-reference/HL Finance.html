<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL Finance</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Responsive shell */
    .sidebar-mobile { display: none; }
    .topbar-menu { display: none !important; }
    .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    @media (max-width: 1180px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    }
    @media (max-width: 900px) {
      .sidebar-desktop { display: none; }
      .topbar-menu { display: flex !important; }
      .page-inner { padding: 20px 16px; }
      .bon-layout { flex-direction: column; }
      .bon-summary { width: 100% !important; position: static !important; }
      .cust-detail-layout { flex-direction: column; }
      .cust-detail-side { width: 100% !important; flex-direction: row !important; }
    }
    @media (max-width: 720px) {
      .cust-stat-grid { grid-template-columns: 1fr !important; }
      .cust-detail-side { flex-direction: column !important; }
    }
    .bar-col:hover .bar-val { opacity: 1 !important; }
    @media (max-width: 900px) {
      .report-charts { flex-direction: column; }
      .report-donut-card { width: 100% !important; }
    }
    @media (max-width: 560px) {
      .summary-grid { grid-template-columns: 1fr !important; }
      .bon-fields { grid-template-columns: 1fr !important; }
      .topbar-new span { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="page-login.jsx"></script>
  <script type="text/babel" src="page-dashboard.jsx"></script>
  <script type="text/babel" src="page-customers.jsx"></script>
  <script type="text/babel" src="page-products.jsx"></script>
  <script type="text/babel" src="page-transactions.jsx"></script>
  <script type="text/babel" src="page-bon.jsx"></script>
  <script type="text/babel" src="page-bon-detail.jsx"></script>
  <script type="text/babel" src="page-reports.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
